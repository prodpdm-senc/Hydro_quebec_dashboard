name: Update Nuclear Data

# Runs every 30 minutes, and also manually on demand
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch IESO nuclear data and update JSON files
        run: |
          mkdir -p data
          python3 << 'PYEOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import json
          import os
          from datetime import datetime, timezone

          url = 'https://reports-public.ieso.ca/public/GenOutputCapability/PUB_GenOutputCapability.xml'
          ns  = 'http://www.theIMO.com/schema'

          print(f"Fetching {url} ...")
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=30) as resp:
              xml_data = resp.read()
          print(f"Downloaded {len(xml_data):,} bytes")

          root = ET.fromstring(xml_data)
          date_el = root.find(f'.//{{{ns}}}Date')

          # ── nuclear.json : snapshot complet (unités × heures) ──────────────
          nuclear = {
              'updated': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'date':    date_el.text if date_el is not None else '',
              'hours':   [],
              'units':   {}
          }

          hours_detected = False
          for gen in root.findall(f'.//{{{ns}}}Generator'):
              name_el = gen.find(f'{{{ns}}}GeneratorName')
              fuel_el = gen.find(f'{{{ns}}}FuelType')
              if name_el is None or fuel_el is None:
                  continue
              name = name_el.text.strip()
              fuel = fuel_el.text.strip()
              if fuel != 'NUCLEAR':
                  continue

              outputs = gen.findall(f'.//{{{ns}}}Output')
              if not outputs:
                  continue

              if not hours_detected:
                  nuclear['hours'] = [
                      int(o.find(f'{{{ns}}}Hour').text)
                      for o in outputs
                      if o.find(f'{{{ns}}}Hour') is not None
                  ]
                  hours_detected = True

              mw_list = []
              for o in outputs:
                  mw_el = o.find(f'{{{ns}}}EnergyMW')
                  mw_list.append(int(mw_el.text) if mw_el is not None else 0)
              nuclear['units'][name] = mw_list

          with open('data/nuclear.json', 'w') as f:
              json.dump(nuclear, f, indent=2)

          total_mw = sum(arr[-1] for arr in nuclear['units'].values() if arr)
          print(f"nuclear.json saved: {nuclear['updated']} | {len(nuclear['units'])} units | {len(nuclear['hours'])} hours | {total_mw} MW")

          # ── Fetch Ontario total output ──
          ontario_total = None
          try:
              print("Fetching Ontario total output...")
              ieso_url = 'https://reports.ieso.ca/public/RealtimeConstTotals/PUB_RealtimeConstTotals.xml'
              req = urllib.request.Request(ieso_url, headers={
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              })
              with urllib.request.urlopen(req, timeout=15) as resp:
                  ieso_xml = resp.read()

              # Log response info for debugging
              print(f"IESO response: {len(ieso_xml)} bytes, starts with: {ieso_xml[:100]}")

              ieso_root = ET.fromstring(ieso_xml)

              # Try multiple element names with namespace awareness
              total_el = (ieso_root.find('.//TotalOutput') or
                         ieso_root.find('.//{http://www.theIMO.com/schema}TotalOutput') or
                         ieso_root.find('.//MarketDemand') or
                         ieso_root.find('.//{http://www.theIMO.com/schema}MarketDemand') or
                         ieso_root.find('.//TotalEnergy') or
                         ieso_root.find('.//{http://www.theIMO.com/schema}TotalEnergy'))

              if total_el is not None:
                  total_text = total_el.text.strip() if total_el.text else None
                  if total_text:
                      ontario_total = int(float(total_text))
                      print(f"✅ Ontario total output: {ontario_total} MW")
                  else:
                      print(f"⚠️ Found element but no text: {ET.tostring(total_el)[:200]}")
              else:
                  # Log available elements for debugging
                  all_tags = set([child.tag for child in ieso_root.iter()])
                  print(f"⚠️ Element not found. Available tags: {all_tags}")
          except Exception as e:
              print(f"❌ Could not fetch Ontario total: {e}")

          # ── history.json : rolling 7 jours, résolution 30 min ───────────────
          PLANT_GROUPS = {
              'bruce':      ['BRUCEA-G1','BRUCEA-G2','BRUCEA-G3','BRUCEA-G4',
                             'BRUCEB-G5','BRUCEB-G6','BRUCEB-G7','BRUCEB-G8'],
              'darlington': ['DARLINGTON-G1','DARLINGTON-G2','DARLINGTON-G3','DARLINGTON-G4'],
              'pickering':  ['PICKERINGB-G5','PICKERINGB-G6','PICKERINGB-G7','PICKERINGB-G8']
          }

          history_file = 'data/history.json'
          if os.path.exists(history_file):
              with open(history_file) as f:
                  try:
                      history = json.load(f)
                  except Exception:
                      history = {'updated': '', 'data': []}
          else:
              history = {'updated': '', 'data': []}

          # Build current snapshot (last known MW per plant + individual units)
          snapshot = {'ts': nuclear['updated'], 'total': 0, 'plants': {}}
          for plant, unit_names in PLANT_GROUPS.items():
              plant_total = 0
              plant_units = {}
              for u in unit_names:
                  arr = nuclear['units'].get(u)
                  if arr:
                      val = arr[-1] or 0
                      plant_units[u] = val
                      plant_total += val
              snapshot['plants'][plant] = {'total': plant_total, 'units': plant_units}
              snapshot[plant] = plant_total  # Keep for backward compat
              snapshot['total'] += plant_total

          # Add Ontario total output if available
          if ontario_total is not None:
              snapshot['ontario_total'] = ontario_total

          history['data'].append(snapshot)
          history['updated'] = snapshot['ts']

          # Keep last 336 entries = 7 days × 48 runs/day
          MAX_ENTRIES = 336
          if len(history['data']) > MAX_ENTRIES:
              history['data'] = history['data'][-MAX_ENTRIES:]

          with open(history_file, 'w') as f:
              json.dump(history, f, separators=(',', ':'))

          status_msg = f"history.json saved: {len(history['data'])} entries | nuclear {snapshot['total']} MW"
          if ontario_total is not None:
              status_msg += f" | Ontario total {ontario_total} MW"
          print(status_msg)
          PYEOF

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nuclear.json data/history.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "data: nuclear update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          )
